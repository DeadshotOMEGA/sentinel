name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test?schema=public

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sentinel/database prisma generate

      - name: Verify Prisma migrations match canonical schema
        env:
          DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_migration_guard?schema=public
          PRISMA_SHADOW_DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_migration_guard_shadow?schema=public
        run: |
          pnpm --filter @sentinel/database exec node --input-type=module <<'NODE'
          import { Client } from 'pg'

          const client = new Client({
            host: 'localhost',
            port: 5432,
            user: 'sentinel',
            password: 'sentinel',
            database: 'postgres',
          })

          const databases = ['sentinel_migration_guard', 'sentinel_migration_guard_shadow']

          try {
            await client.connect()
            for (const database of databases) {
              await client.query(`DROP DATABASE IF EXISTS "${database}" WITH (FORCE)`)
              await client.query(`CREATE DATABASE "${database}"`)
            }
          } finally {
            await client.end()
          }
          NODE

          pnpm --filter @sentinel/database exec prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code

      - name: Bootstrap schema on fresh CI Postgres instance
        run: pnpm --filter @sentinel/database exec prisma db push

      - name: Run safe Prisma migration deploy (must fail on non-zero)
        run: pnpm --filter @sentinel/database prisma:migrate:deploy:safe

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Validate help wiki slug index
        run: pnpm check:help-slugs
