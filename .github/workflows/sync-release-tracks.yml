name: Sync Release Tracks

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      current_version:
        description: 'Current release version (X.Y.Z or vX.Y.Z). Defaults to package.json/release tag.'
        required: false
        type: string
      project_number:
        description: 'GitHub Project number (defaults to repo var SENTINEL_PROJECT_NUMBER or 3).'
        required: false
        type: string
      repository:
        description: 'owner/repo target (defaults to current repository).'
        required: false
        type: string
      project_owner:
        description: 'Project owner login override (defaults to repo var SENTINEL_PROJECT_OWNER or repo owner).'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Sync project Release options and milestones
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      INPUT_CURRENT_VERSION: ${{ github.event.inputs.current_version }}
      INPUT_PROJECT_NUMBER: ${{ github.event.inputs.project_number }}
      INPUT_REPOSITORY: ${{ github.event.inputs.repository }}
      INPUT_PROJECT_OWNER: ${{ github.event.inputs.project_owner }}
      DEFAULT_REPOSITORY: ${{ github.repository }}
      REPO_VARS_JSON: ${{ toJSON(vars) }}
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate token
        run: |
          if [[ -z "${PROJECTS_TOKEN}" ]]; then
            echo "::warning::PROJECTS_TOKEN is missing. Milestones will still sync; GitHub Project Release field sync will be skipped."
          fi

      - name: Sync release tracks
        run: |
          set -euo pipefail

          repo_project_number="$(jq -r '.SENTINEL_PROJECT_NUMBER // empty' <<<"${REPO_VARS_JSON}")"
          repo_project_owner="$(jq -r '.SENTINEL_PROJECT_OWNER // empty' <<<"${REPO_VARS_JSON}")"

          target_repo="${INPUT_REPOSITORY:-$DEFAULT_REPOSITORY}"
          if [[ -n "${INPUT_PROJECT_NUMBER}" ]]; then
            export PROJECT_NUMBER="${INPUT_PROJECT_NUMBER}"
          elif [[ -n "${repo_project_number}" ]]; then
            export PROJECT_NUMBER="${repo_project_number}"
          else
            export PROJECT_NUMBER="3"
          fi
          if [[ -n "${INPUT_PROJECT_OWNER}" ]]; then
            export PROJECT_OWNER="${INPUT_PROJECT_OWNER}"
          elif [[ -n "${repo_project_owner}" ]]; then
            export PROJECT_OWNER="${repo_project_owner}"
          fi

          if [[ -n "${INPUT_CURRENT_VERSION}" ]]; then
            export CURRENT_RELEASE_VERSION="${INPUT_CURRENT_VERSION}"
          elif [[ "${EVENT_NAME}" == "release" && -n "${RELEASE_TAG}" ]]; then
            export CURRENT_RELEASE_VERSION="${RELEASE_TAG}"
          fi

          bash scripts/github/sync-release-tracks.sh "${target_repo}"
